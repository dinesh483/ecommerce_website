<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create account — Atelier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="header-bar">
    <a href="index.html" class="brand">Atelier<small>N°04 GENERAL GOODS</small></a>
    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
    </nav>
    <div class="header-actions">
      <button class="icon-btn" data-open-cart aria-label="Cart">
        <svg viewBox="0 0 24 24"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8V6a3 3 0 016 0v2"/></svg>
        <span class="badge-count cart-badge" style="display:none;">0</span>
      </button>
    </div>
  </div>
</header>

<div class="auth-shell">
  <div style="text-align:center;margin-bottom:26px;">
    <span class="eyebrow">Join the studio</span>
    <h1 style="font-size:28px;margin-top:8px;">Create your account</h1>
  </div>
  <div class="card-panel">
    <div id="form-msg"></div>
    <form id="register-form">
      <div class="field">
        <label for="full_name">Full name</label>
        <input type="text" id="full_name" autocomplete="name" />
      </div>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" required minlength="3" autocomplete="username" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" autocomplete="new-password" />
        <div class="field-error" style="color:var(--muted);">At least 6 characters.</div>
      </div>
      <button class="btn btn-primary btn-block" type="submit" id="submit-btn">Create account</button>
    </form>
  </div>
  <div class="auth-switch">Already shopping with us? <a href="login.html">Sign in</a></div>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
