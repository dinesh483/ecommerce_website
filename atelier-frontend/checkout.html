<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkout — Atelier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="header-bar">
    <a href="index.html" class="brand">Atelier<small>N°04 GENERAL GOODS</small></a>
    <nav class="main-nav">
      <a href="shop.html">← Continue shopping</a>
    </nav>
    <div class="header-actions">
      <button class="icon-btn" data-open-cart aria-label="Cart">
        <svg viewBox="0 0 24 24"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8V6a3 3 0 016 0v2"/></svg>
        <span class="badge-count cart-badge" style="display:none;">0</span>
      </button>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="checkout-layout">
    <div>
      <span class="eyebrow">Checkout</span>
      <h1 style="font-size:30px;margin:8px 0 26px;">Shipping details</h1>
      <div id="checkout-msg"></div>
      <div id="checkout-form-wrap"></div>
    </div>

    <div class="order-review">
      <h3 style="font-family:var(--font-display);font-size:19px;margin-bottom:16px;">Order summary</h3>
      <div id="review-lines"></div>
      <div id="review-totals" style="margin-top:14px;"></div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/checkout.js"></script>
</body>
</html>
